services:
  whatsmeow-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: whatsmeow-api:dev
    container_name: whatsmeow-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.toml:/app/config.toml:ro
    environment:
      WMAPI_LOG_FORMAT: json
