data_dir = "./data"

[server]
bind = "127.0.0.1"
port = 8080

[auth]
# Leave empty to disable auth (only safe when bound to localhost).
token = ""

[storage]
# "sqlite" or "postgres"
backend = "sqlite"
sqlite_path = "./data/whatsmeow-api.db"
# Used when backend = "postgres". For Supabase, use the connection-pooler DSN.
postgres_dsn = ""

[log]
level = "info"   # debug | info | warn | error
format = "text"  # text | json

[events]
# How long to retain SSE events for Last-Event-ID resume.
retention_hours = 24

[metrics]
# Expose Prometheus /metrics. Off by default.
enabled = false

[http]
# Maximum body size for POST /v1/media (uploads). Default 100 MiB.
max_body_bytes = 104857600
# Plan 09 — SSE event stream
sse_heartbeat_seconds = 25    # comment-ping interval; <=0 disables
sse_subscriber_buffer = 256   # per-subscriber channel buffer; overflow drops the connection
